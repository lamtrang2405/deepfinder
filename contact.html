<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DeepFinder — Contact</title>
  <style>
    :root{
      --bg:#0b1220; --bg2:#0d1b2a;
      --card:rgba(255,255,255,.06); --stroke:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.95); --muted:rgba(255,255,255,.72);
      --brand:#3b82f6; --radius:22px; --max:920px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }
    a{color:rgba(255,255,255,.9)}
    .wrap{max-width:var(--max); margin:0 auto; padding:28px 20px 70px;}
    .top{
      display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
      padding:12px 14px;
      border:1px solid var(--stroke);
      border-radius:999px;
      background:rgba(255,255,255,.04);
    }
    .top a{ text-decoration:none; font-weight:700 }
    .btn{
      display:inline-flex; align-items:center; gap:10px;
      padding:10px 14px; border-radius:999px;
      border:1px solid rgba(59,130,246,.45);
      background:rgba(59,130,246,.16);
      text-decoration:none;
    }
    h1{margin:18px 0 6px; letter-spacing:-.03em}
    p{color:rgba(255,255,255,.78); line-height:1.65}
    .card{
      margin-top:14px;
      padding:18px 16px;
      border:1px solid var(--stroke);
      background:var(--card);
      border-radius:var(--radius);
    }
    label{display:block; font-weight:700; margin:12px 0 6px}
    input,textarea{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);
      color:var(--text);
      padding:12px 12px;
      font:inherit;
      outline:none;
    }
    textarea{min-height:120px; resize:vertical}
    .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
    .send{
      display:inline-flex; align-items:center; justify-content:center;
      padding:12px 16px;
      border-radius:999px;
      border:1px solid rgba(59,130,246,.45);
      background:linear-gradient(135deg, rgba(59,130,246,.95), rgba(96,165,250,.9));
      color:#fff;
      font-weight:800;
      text-decoration:none;
    }
    .muted{color:var(--muted); font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="landing.html">← Back to Home</a>
      <a class="btn" href="https://apps.apple.com/vn/app/deepfinder-ai-profile-search/id6753770460?l=vi" target="_blank" rel="noopener">Download on App Store</a>
    </div>

    <h1>Contact</h1>
    <p>Have a question, feedback, or need help? Send us a message.</p>

    <div class="card">
      <form id="contactForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>

        <label for="subject">Subject</label>
        <input id="subject" name="subject" type="text" placeholder="Support request" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="How can we help?" required></textarea>

        <div class="actions">
          <a class="send" id="mailtoBtn" href="mailto:admin@z02group.com">Send email</a>
          <a class="btn" href="privacy.html">Privacy</a>
          <a class="btn" href="terms.html">Terms</a>
        </div>
        <p class="muted">This form opens your email app using a mailto link. Recipient: <a href="mailto:admin@z02group.com">admin@z02group.com</a></p>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const mailtoBtn = document.getElementById('mailtoBtn');
    function updateMailto(){
      const email = document.getElementById('email').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const message = document.getElementById('message').value.trim();
      const body = `From: ${email}\\n\\n${message}`;
      const href = `mailto:admin@z02group.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      mailtoBtn.href = href;
    }
    form.addEventListener('input', updateMailto);
    updateMailto();
  </script>
</body>
</html>
