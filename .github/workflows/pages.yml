name: Deploy DeepFinder to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Install dependencies
        working-directory: deepfinder_app
        run: flutter pub get

      - name: Build web (GitHub Pages)
        working-directory: deepfinder_app
        run: flutter build web --release --base-href /deepfinder/

      - name: Publish pencil-new.html on Pages
        run: |
          cp pencil-new.html deepfinder_app/build/web/pencil-new.html
          cat > deepfinder_app/build/web/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>DeepFinder Onboarding</title>
            <meta http-equiv="refresh" content="0; url=./pencil-new.html" />
          </head>
          <body>
            <p>Redirecting to <a href="./pencil-new.html">pencil-new.html</a>...</p>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deepfinder_app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

